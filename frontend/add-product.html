<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>

<b style="color:white;margin-right:20px">
CHECKOUT
</b>

<button onclick="goProducts()">Products</button>
<button onclick="goCheckout()">Checkout</button>
<button onclick="goReports()">Reports</button>
<button onclick="logout()">Logout</button>

</nav>

<h2 style="text-align:center;">Add New Product</h2>

<div class="form-card">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="quantity" placeholder="Quantity">

<button class="btn-green" onclick="addProduct()">Add Product</button>

<p id="msg"></p>

<br>

<button class="btn-blue" onclick="window.location='products.html'">
Back to Products
</button>

</div>

<div id="confirmModal" class="modal">

    <div class="modal-box">

        <h3 id="confirmText">
            Are you sure you want to logout?
        </h3>

        <button onclick="confirmYes()">
            Yes
        </button>

        <button onclick="confirmNo()">
            Cancel
        </button>

    </div>

</div>


<div id="passwordModal" class="modal">

    <div class="modal-box">

        <h3>
            Enter password to confirm logout
        </h3>

        <input id="passwordInput" type="password">

        <br><br>

        <button onclick="passwordOk()">
            Confirm
        </button>

        <button onclick="passwordCancel()">
            Cancel
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
