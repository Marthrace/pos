<!DOCTYPE html>
<html>
<head>

<title>Reports</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkAuth()">

<nav>

<b style="color:white;margin-right:20px">
CHECKOUT
</b>

<button onclick="goProducts()">Products</button>
<button onclick="goCheckout()">Checkout</button>
<button onclick="goReports()">Reports</button>

</nav>


<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h2>Reports Dashboard</h2>
        <p>View system insights and sales data</p>
    </div>

    <!-- ACTIONS -->
    <div class="report-actions">

        <button class="btn-blue" onclick="loadReport()">
            Generate Report
        </button>

        <button class="btn-red" onclick="loadLowStock()">
            Low Stock
        </button>

        <button class="btn-cyan" onclick="loadCashierReport()">
            Today's Sales
        </button>

    </div>

    <!-- RESULT -->
    <div class="report-card">

        <h3>Result</h3>

        <div id="report"></div>

    </div>

    <!-- BACK BUTTON -->
    <div class="back-section">
        <button class="btn-green" onclick="goProducts()">
            ← Back to Products
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
