<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h2>Signup</h2>

<input id="username" placeholder="Username">

<button class="btn-green" onclick="signup()">Signup</button>

<p id="msg"></p>

<a href="login.html">Back to Login</a>

</div>

<script src="script.js"></script>

</body>
</html>
