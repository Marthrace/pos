<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkAuth(); loadProductsForCheckout()">

<nav>

<b style="color:white;margin-right:20px">
CHECKOUT
</b>

<button onclick="goProducts()">Products</button>
<button onclick="goCheckout()">Checkout</button>
<button onclick="goReports()">Reports</button>


</nav>


<div class="container">

<h2>Checkout</h2>


<div style="display:flex; gap:30px;">


<!-- PRODUCTS -->

<div class="card" style="width:50%">

<h3>Products</h3>

<!-- Search bar -->
<input
    type="text"
    id="productSearch"
    placeholder="Search product..."
    onkeyup="searchProducts()"
    style="width:100%; padding:5px; margin-bottom:10px;"
>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Add</th>
        </tr>
    </thead>

    <tbody id="productsTable"></tbody>
</table>

</div>



<!-- CART -->

<div class="card" style="width:50%">

<h3>Cart</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="cartTable"></tbody>

</table>

<br>

<h3 id="total">Total: 0</h3>

<br>

<button class="btn-green" onclick="checkout()">
Checkout
</button>

<button class="btn-red" onclick="clearCart()">
Clear Cart
</button>

<p id="msg"></p>

</div>


</div>


</div>

<div id="inputModal" class="modal">

    <div class="modal-box">

        <h3 id="modalTitle">Enter value</h3>

        <input id="modalInput" type="number">

        <br><br>

        <button onclick="modalOk()">OK</button>
        <button onclick="modalCancel()">Cancel</button>

    </div>

</div>



<script src="script.js"></script>

</body>
</html>
