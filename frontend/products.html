<!DOCTYPE html>
<html>
<head>

<title>Products</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkAuth(); loadProducts(); checkAdminUI()">

<nav>

<b style="color:white;margin-right:20px">
CHECKOUT
</b>

<button onclick="goProducts()">Products</button>
<button onclick="goCheckout()">Checkout</button>
<button onclick="goReports()">Reports</button>
<button id="resetBtn" onclick="openResetModal()">
Reset Password
</button>
<button onclick="logout()">Logout</button>

</nav>


<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h2>Products</h2>
        <p>Manage your inventory</p>
    </div>

    <!-- ACTIONS -->
    <div class="top-actions">

        <button class="btn-blue" onclick="loadProducts()">
            Refresh
        </button>

        <button class="btn-green"
        onclick="window.location='add-product.html'">
            + Add Product
        </button>

    </div>

    <!-- TABLE -->
    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                </tr>
            </thead>

            <tbody id="productsTable"></tbody>

        </table>

    </div>

</div>


<!-- INPUT MODAL -->
<div id="inputModal" class="modal">

    <div class="modal-box">

        <h3 id="modalTitle">Enter value</h3>

        <input id="modalInput" type="password">

        <br><br>

        <button onclick="modalOk()">Confirm</button>
        <button onclick="modalCancel()">Cancel</button>

    </div>

</div>


<!-- LOGOUT MODAL -->
<div id="passwordModal" class="modal">

    <div class="modal-box">

        <h3>Enter password to confirm logout</h3>

        <input id="passwordInput" type="password">

        <br><br>
        
        <button onclick="passwordOk()">Confirm</button>
        <button onclick="passwordCancel()">Cancel</button>

    </div>

</div>


<!-- RESET MODAL -->
<div id="resetModal" class="modal">

    <div class="modal-box">

        <span class="close" onclick="closeResetModal()">✖</span>

        <h2>Admin Reset Password</h2>
        <p id="resetDesc">Reset a user's password</p>

        <input id="resetUsername" placeholder="Enter username">
       <input id="resetPassword" type="password" placeholder="Enter new password">
       <input id="confirmPassword" type="password" placeholder="Confirm password">

        <!-- MESSAGE AREA -->
        <div id="resetMsg" class="modal-msg"></div>

        <!-- BUTTONS -->
        <div class="modal-actions">

            <button id="resetBtnAction"
                    class="btn-green"
                    onclick="resetPasswordAdmin()">
                Reset Password
            </button>

            <button class="btn-red"
                    onclick="closeResetModal()">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
