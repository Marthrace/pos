 <!DOCTYPE html>
<html>
<head>

<title>Products</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkAuth(); loadProducts(); checkAdminUI()">

<nav>

<b style="color:white;margin-right:20px">
CHECKOUT
</b>

<button onclick="goProducts()">Products</button>
<button onclick="goCheckout()">Checkout</button>
<button onclick="goReports()">Reports</button>
<button id="resetBtn" onclick="openResetModal()">
Reset Password
</button>
<button onclick="logout()">Logout</button>

</nav>


<div class="container">

<h2>Products</h2>


<div class="top-actions">

<button class="btn-blue"
onclick="loadProducts()">
Refresh
</button>

<button class="btn-green"
onclick="window.location='add-product.html'">
Add Product
</button>

</div>


<div class="table-card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Quantity</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>

</div>


</div>

<!-- INPUT MODAL -->
<div id="inputModal" class="modal">

    <div class="modal-box">

        <h3 id="modalTitle">Enter value</h3>

        <input id="modalInput" type="password">

        <br><br>

        <button onclick="modalOk()">Confirm</button>
        <button onclick="modalCancel()">Cancel</button>

    </div>

</div>


<!-- LOGOUT MODAL -->
<div id="passwordModal" class="modal">

    <div class="modal-box">

        <h3>Enter password to confirm logout</h3>

        <input id="passwordInput" type="password">

        <br><br>

        <button onclick="passwordOk()">Confirm</button>
        <button onclick="passwordCancel()">Cancel</button>

    </div>

</div>


<!-- RESET MODAL -->
<div id="resetModal" class="modal">

    <div class="modal-box">

        <h3>Admin Reset Password</h3>

        <input id="resetUsername" placeholder="Username">

        <input id="resetPassword"
               type="password"
               placeholder="New Password">

        <br><br>

        <button onclick="resetPasswordAdmin()">
            Reset
        </button>

        <button onclick="closeResetModal()">
            Cancel
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
